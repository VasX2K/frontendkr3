<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PWA Список задач</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/styles.css">
  <meta name="theme-color" content="#3478f6">
</head>
<body>
  <div class="app">
    <header class="top">
      <div>
        <h1>PWA Список задач</h1>
        <p id="netStatus">Проверка сети...</p>
      </div>
      <button id="installBtn" hidden>Установить PWA</button>
    </header>

    <section class="card">
      <h2>Задачи</h2>
      <form id="taskForm">
        <input id="taskInput" autocomplete="off" placeholder="Введите задачу">
        <button>Добавить</button>
      </form>
      <ul id="taskList"></ul>
      <div class="row">
        <span id="stats">Всего: 0 Выполнено: 0 Осталось: 0</span>
        <button id="clearDone" type="button">Удалить выполненные</button>
      </div>
    </section>

    <section class="card">
      <h2>Уведомления</h2>
      <div class="row">
        <button id="subscribeBtn">Разрешить уведомления</button>
        <button id="pushBtn">Тестовое уведомление</button>
      </div>
      <form id="reminderForm">
        <input id="delayInput" type="number" min="1" value="10">
        <button>Запланировать уведомление</button>
      </form>
      <div class="row">
        <button class="preset" data-sec="10">10 секунд</button>
        <button class="preset" data-sec="30">30 секунд</button>
        <button class="preset" data-sec="60">1 минута</button>
      </div>
      <p id="pushStatus"></p>
    </section>

    <section class="card">
      <h2>Контент без перезагрузки</h2>
      <button id="loadMain">Загрузить content/main.html</button>
      <div id="contentBox"></div>
    </section>

    <footer id="quote"></footer>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
